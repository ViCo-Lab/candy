name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            cross: false
          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            cross: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-
      - if: '!matrix.cross'
        run: cargo build --release --manifest-path rust/Cargo.toml --target ${{ matrix.target }}
        shell: bash
      - if: matrix.cross
        run: cross build --release --manifest-path rust/Cargo.toml --target ${{ matrix.target }}
        shell: bash
      - id: binpath
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            echo "bin=rust/target/${{ matrix.target }}/release/candy.exe" >> "$GITHUB_OUTPUT"
          else
            echo "bin=rust/target/${{ matrix.target }}/release/candy" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: candy-${{ matrix.target }}
          path: ${{ steps.binpath.outputs.bin }}
          if-no-files-found: warn

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: test-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: test-cargo-
      - run: cargo test --manifest-path rust/Cargo.toml
        shell: bash

  typst-package:
    name: Package Typst library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        run: |
          VERSION=$(grep -m1 '^version' typst/typst.toml | sed -E 's/.*= *"([^"]+)".*/\1/')
          tar -czf "candy-typst-${VERSION}.tar.gz" -C typst .
      - uses: actions/upload-artifact@v4
        with:
          name: candy-typst
          path: candy-typst-*.tar.gz
          if-no-files-found: error
