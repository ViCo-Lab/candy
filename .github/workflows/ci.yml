name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Build the `candy` Rust binary on every supported platform.
  # Build only — no publishing. The binary is uploaded as a workflow artifact.
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable, edition 2024)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build candy (release)
        run: cargo build --release --manifest-path rust/Cargo.toml
        shell: bash

      - name: Upload candy binary
        uses: actions/upload-artifact@v4
        with:
          name: candy-${{ matrix.os }}
          path: |
            rust/target/release/candy
            rust/target/release/candy.exe
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Package the Typst library as an @preview-compatible source tarball.
  # Platform-independent, so it runs once on Linux. Uploaded as an artifact.
  # (Typst 0.15 has no `typst package` CLI subcommand; the package source is
  # just the `typst/` directory — tar it up for distribution.)
  # ---------------------------------------------------------------------------
  typst-package:
    name: Package Typst library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Typst package tarball
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version' typst/typst.toml | sed -E 's/.*= *"([^"]+)".*/\1/')
          echo "Typst package version: ${VERSION}"
          tar -czf "candy-typst-${VERSION}.tar.gz" -C typst .
          echo "Created candy-typst-${VERSION}.tar.gz"

      - name: Upload Typst package
        uses: actions/upload-artifact@v4
        with:
          name: candy-typst
          path: candy-typst-*.tar.gz
          if-no-files-found: error
