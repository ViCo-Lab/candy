# Linux cross targets need the target-architecture OpenSSL dev libraries.
#
# `typst-kit`'s `system-downloader` feature pulls in
#   ureq -> native-tls -> openssl-sys
# which links the *system* OpenSSL. The cross-rs containers only ship the base
# target sysroot (libc), not `libssl-dev`, so `openssl-sys` fails to find
# `openssl.pc` during cross builds (pkg-config error seen in CI).
#
# `pre-build` runs inside the cross container before compiling; we enable the
# target dpkg architecture and install the matching `libssl-dev`, which provides
# the headers, libs and `openssl.pc` the build needs. macOS/Windows targets use
# SecureTransport/Schannel instead of OpenSSL, so they are unaffected.

[target.aarch64-unknown-linux-gnu]
pre-build = [
  "dpkg --add-architecture arm64",
  "apt-get update && apt-get install --assume-yes libssl-dev:arm64",
]

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
  "dpkg --add-architecture armhf",
  "apt-get update && apt-get install --assume-yes libssl-dev:armhf",
]

[target.i686-unknown-linux-gnu]
pre-build = [
  "dpkg --add-architecture i386",
  "apt-get update && apt-get install --assume-yes libssl-dev:i386",
]
