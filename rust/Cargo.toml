[package]
    # Published to crates.io as `candy-animation` (the name `candy` is taken),
    # but the library crate and binary both keep the id `candy` (see [lib]/[[bin]]
    # below) so existing `use candy::...` imports and the `candy` CLI are unchanged.
    name    = "candy-animation"
    version = "0.1.0"
    edition = "2024"
    # Minimum Supported Rust Version: edition 2024 requires Rust 1.85+.
    rust-version = "1.85"
    description = "Code-oriented Animation eNgine Designed for tYpst â€” Rust rendering & encoding backend"
    license = "MIT OR Apache-2.0"
    authors = [
        "Shining Yang <97453940+ShiningYangYXN@users.noreply.github.com>",
    ]
    readme = "README.md"
    homepage = "https://github.com/ViCo-Lab/candy"
    repository = "https://github.com/ViCo-Lab/candy"
    documentation = "https://docs.rs/candy-animation"
    keywords = ["animation", "typst", "graphics", "manim", "video"]
    categories = ["graphics", "multimedia::video", "command-line-utilities"]
    # Keep the published crate lean: CI config, build intermediates and large
    # example assets are not needed by consumers.
    exclude = ["/.github", "/target", "/.candy", "/dist"]

    [package.metadata.candy]
        candy    = "TYX"
        tyx      = "Candy"
        codename = "Ribose"
        secret   = "Built for Candy(TYX). In memory of CChO2025."

[lib]
    name = "candy"
    path = "src/lib.rs"

[[bin]]
    name = "candy"
    path = "src/main.rs"

[dependencies]
    clap       = { version = "4", features = ["derive"] }
    serde      = { version = "1", features = ["derive"] }
    serde_json = "1"

    # Terminal coloring for diagnostic output (error / warn / info / debug).
    # Pure Rust, no native deps, so it cross-compiles like the rest of candy.
    # Coloring is applied only when the target stream is a TTY and `NO_COLOR`
    # (https://no-color.org) is unset, so piped / captured output stays ANSI-free.
    colored = "2"

    # Direct page rendering via the Typst compiler library (bypasses the `typst` CLI).
    # The internal typst crates are pulled in explicitly so we can build an in-memory
    # `World` to compile `.tyx` sources in-process.
    typst         = "0.15.1"
    typst-render  = "0.15.1"
    typst-svg     = "0.15.1"
    typst-library = "0.15.1"
    typst-layout  = "0.15.1"
    typst-syntax  = "0.15.1"
    typst-utils   = "0.15.1"

    # Bounded-memory guard for the per-frame recompiler. typst's internal
    # functions (`compile`, `eval`, `layout`, â€¦) are memoized via comemo and are
    # keyed by the `World`. Because the whole-document native-Typst path varies
    # the `World` per frame (different `sys.inputs` â‡’ a different `Library`),
    # comemo would otherwise accumulate one compiled document per distinct
    # inputs set and OOM on long animations. We evict comemo's global cache after
    # each compile (our own LRU `body_cache` retains the documents we need), so
    # comemo only ever holds the current frame's transient sub-computations.
    # Version is pinned to match the comemo typst itself depends on, so the
    # `evict` call clears the *same* global cache typst's memoized fns use.
    comemo = "=0.5.1"

    # typst-kit provides the same font discovery and package resolution that the
    # official `typst` CLI uses, so candy's in-process World behaves identically to
    # `typst compile` (system fonts, @preview package fetch, embedded fallbacks).
    # NOTE: typst-kit's own `system-downloader` feature is intentionally NOT enabled
    # here. It pulls in `ureq` + `native-tls` + `openssl-sys`, which links the
    # *system* OpenSSL and breaks cross-compilation (no target-arch `libssl-dev` in
    # the cross container) and requires an OpenSSL dev package + perl on every host.
    # Instead, candy supplies its own `Downloader` (see `src/renderer/typst.rs`)
    # backed by `ureq` with the pure-Rust `rustls` TLS backend, so @preview fetch
    # needs no OpenSSL, no perl and no native library on any platform (host or
    # cross). `system-files` is what actually wires package resolution into the
    # World; the downloader implementation is candy's own.
    typst-kit = { version = "0.15", features = [
        "embedded-fonts",
        "scan-fonts",
        "system-files",
        "datetime",
        # `DiagnosticWorld` (see `world.rs`) â€” user-facing file-name formatting
        # for compile diagnostics, mirroring the official `typst` CLI. Only pulls
        # in `codespan-reporting`, no native deps.
        "emit-diagnostics",
    ] }

    # HTTP client for candy's @preview package downloader. The `tls` feature uses
    # the pure-Rust `rustls` + `webpki-roots` (bundled CA roots) backend â€” no
    # OpenSSL, no `native-tls`, no system cert store, no perl. This replaces
    # typst-kit's `native-tls`-based downloader.
    ureq = { version = "2", default-features = false, features = [
        "tls",
        "gzip",
    ] }

    # Mature keyframe / easing library. candy's `Easing` enum delegates its math
    # to `keyframe::functions::*` so we get well-tested implementations of the
    # standard ease curves (linear, quadratic, cubic, sine, circular, exponential,
    # smoothstep, bezier) for free, and only hand-roll the Manim-specific curves
    # (there_and_back, wiggle, lingering) that keyframe doesn't ship.
    keyframe = "1.1"

    # Lightweight AV1 encoding backend (no FFmpeg, pure Rust).
    # `default-features = false` disables the nasm assembly backend so it builds
    # with the portable Rust/C implementation on any host.
    # 0.8.1 is the latest published release (no 0.8.2 / 0.9 exists yet); the
    # rav1e encoder is made robust against its 0.8.1 tiling-panic via an
    # interâ†’all-intra retry in `src/renderer/rav1e.rs`.
    rav1e = { version = "0.8.1", default-features = false }

    # In-process H.264 encoder. `openh264` links the system `libopenh264` library
    # at build time but performs all encoding in-process â€” candy never spawns a
    # system command (no `x264`/`x265`/FFmpeg CLI).
    openh264 = "0.9.7"

    # Optional GPU rasterization via vello (GPU compute 2D renderer) + wgpu.
    # Disabled by default â€” enable with `--features gpu`. When active, the
    # `--gpu` CLI flag rasterizes SVG frames on the GPU instead of via
    # `typst-render` (CPU). Falls back to CPU automatically if no GPU device.
    #
    # Version pinning is critical here: `vello_svg` 0.9.x depends on `vello`
    # ^0.7, and `vello` 0.7's GPU `Renderer` is gated behind vello's own `wgpu`
    # feature â€” so we must match `vello` 0.7 (NOT 0.8/0.9) and enable that
    # feature. `vello` 0.7 in turn requires `wgpu` ^27. Mixing a newer `vello`
    # or `wgpu` with `vello_svg` produces incompatible `Scene`/`Renderer` types
    # from two different crate versions and fails to compile.
    vello     = { version = "0.7", features = ["wgpu"], optional = true }
    wgpu      = { version = "27", optional = true }
    vello_svg = { version = "0.9", optional = true }
    # Lightweight blocking executor for wgpu's async device-creation API.
    pollster = { version = "1.0.1", optional = true }

    # Minimal, zero-dependency XML DOM used to walk the SVG Typst emits for a
    # formula and extract each glyph / decoration (fraction bar, root, â€¦) as a
    # positioned fragment. This lets the per-glyph `transform` use Typst's *real*
    # layout (exact positions, correct script sizes, true fraction bars) instead
    # of a hand-rolled token scanner.
    roxmltree = "0.21.1"

    # SVG â†’ pixels rasterization for the per-glyph `#transform` overlay. The
    # overlay is kept as SVG (`<path>`/`<use>` fragments) and rasterized ONCE at
    # the final step (replacing the old per-fragment pixel path), so the formula
    # is embedded only once in `<defs>` and memory stays bounded. resvg / usvg /
    # tiny-skia are already pulled in transitively by the `gpu` feature; pinning
    # them directly lets the CPU path reuse the exact same versions.
    resvg     = "0.47"
    usvg      = "0.47"
    tiny-skia = "0.12"

    # Parallel frame rasterization (data-parallel over animation frames).
    rayon = "1"

    # Shape morphing: earcut triangulation (port of Flubber's triangulate.js)
    # and glyph outline extraction for text morphing.
    earcutr  = "0.5"
    ab_glyph = "0.2"

    # Raster image output targets (GIF animation + PNG bitmap). Both are pure
    # Rust (no native/C deps, no OpenSSL) so they cross-compile cleanly like the
    # rest of candy's self-contained pipeline. `gif` handles the animated-GIF
    # muxer; `png` handles single-frame RGBA bitmap export.
    gif = "0.13"
    png = "0.17"

    # Linux-only `memfd_create` for the FFmpeg encoder's in-RAM seekable sink
    # (muxed container + stderr never touch disk). Used solely via cfg-gated
    # code on Linux; the crate still builds (and falls back to temp files) on
    # every other platform without pulling in this dependency.
    libc = "0.2"

    # Linux-only `memmap2` for zero-copy audio file loading (mmap instead of
    # fs::read). Used solely via cfg-gated code on Linux.
    memmap2 = { version = "0.9", optional = true }

[build-dependencies]

[features]
    # AV1/H.264 video encoding. The build is fully self-contained: encoders run
    # in-process and containers (MP4 / Matroska) are written by candy itself, so no
    # external tool (FFmpeg, x264, x265) is ever invoked.
    default = ["video", "system-downloader"]
    video   = []
    # GPU-accelerated frame rasterization via vello + wgpu. Off by default because
    # it pulls in heavy native GPU deps; enable with `--features gpu`.
    gpu = ["dep:vello", "dep:wgpu", "dep:vello_svg", "dep:pollster"]
    # @preview package download at render time. Enabled by default â€” when on,
    # `#import "@preview/cetz"` works without a prior `typst compile`. Disable
    # with `--no-default-features` for a fully offline build (packages must then
    # be pre-cached).
    system-downloader = []
    # Enable zero-copy audio file loading on Linux (memmap2).
    zero-copy-audio = ["dep:memmap2"]
